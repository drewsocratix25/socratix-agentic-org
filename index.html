<style>
  :root{--navy:#254E64;--ink:#2E3338;--amber:#254E64;--amber2:#CBBC9E;--gold:#D9A441;--amber-soft:#E8EEF1;--cream:#EFF3F4;--paper:#FFFFFF;--slate:#556270;--line:#DCE3E6;--tint:#E9EFF1;
    --serif:'Cinzel',Georgia,serif;--sans:'Raleway','Segoe UI',system-ui,sans-serif;--sh:0 14px 40px -18px rgba(20,27,46,.28);--sh-lg:0 30px 70px -30px rgba(20,27,46,.45);--r:24px}
  *{box-sizing:border-box}html,body{margin:0;height:100%}

  .btn{cursor:pointer;border:none;border-radius:999px;font-family:var(--sans);font-weight:700;font-size:16px;padding:14px 28px;color:#fff;background:linear-gradient(180deg,#2E5E77,#254E64);box-shadow:0 12px 26px -12px rgba(37,78,100,.7);transition:.18s}

  .grid{display:grid;gap:20px}.g3{grid-template-columns:repeat(3,1fr)}
  .flex{display:flex;align-items:center;gap:12px;flex-wrap:wrap}.between{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap}
  .pill{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;letter-spacing:.6px;padding:4px 9px;border-radius:999px;margin:4px 5px 0 0;text-transform:uppercase}
  .pill.strategy{background:#E8EFF6;color:#1F4E6B}.pill.people{background:#FBEEDD;color:#8a5a12}.pill.tech{background:#EAE7F3;color:#463c73}
  .pill.buy{background:#E4F1E7;color:#1c6b34}.pill.build{background:#FCE7CF;color:#9a5a12}.pill.ignore{background:#F3E2E2;color:#8a2f2f}
  .pill.econ{background:var(--tint);color:var(--slate);text-transform:none;letter-spacing:0}.pill.ond{background:rgba(255,255,255,.12);color:#dfe4ef}
  .icircle{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;background:var(--amber-soft);color:var(--amber);flex:none}.icircle svg{width:24px;height:24px}
  .ring{position:absolute;border-radius:50%;border:2px solid var(--amber);pointer-events:none}.ring.soft{border-color:rgba(255,255,255,.13)}

  @keyframes twinkle{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
  @keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
  @keyframes growX{from{transform:scaleX(0)}to{transform:scaleX(1)}}
  @keyframes drawin{to{stroke-dashoffset:0}}
  @keyframes chatter{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.3)}}
  @keyframes flick{0%,100%{transform:scale(1) rotate(-2deg)}50%{transform:scale(1.06,1.16) rotate(2deg)}}
  @keyframes shake{0%,100%{transform:none}20%{transform:translateX(-8px) rotate(-.4deg)}45%{transform:translateX(7px)}70%{transform:translateX(-4px)}}

  #app>*{animation:fadeUp .5s cubic-bezier(.2,.7,.2,1)}
  .charwrap{animation:pop .55s cubic-bezier(.2,.8,.2,1)}
  .char{transform-box:fill-box;animation:bob 4.6s ease-in-out infinite;overflow:visible}
  .char .eyes{transform-box:fill-box;transform-origin:center;animation:blink 5.2s infinite}
  .char .fl{transform-box:fill-box;animation:drift 6s ease-in-out infinite}
  .char .tw{transform-box:fill-box;transform-origin:center;animation:twinkle 2.4s ease-in-out infinite}

  :focus-visible{outline:3px solid var(--amber);outline-offset:3px}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}

  .scenecard{position:relative;overflow:hidden;border-radius:var(--r);padding:38px 40px;color:var(--cream);min-height:340px;display:flex;align-items:center;background:radial-gradient(600px 340px at 88% 0%,#26325a,transparent 60%),linear-gradient(150deg,#1b2338,#111627)}

  .verdict .vkick{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--slate)}
  .verdict .vline{font-family:var(--serif);font-weight:600;font-size:clamp(24px,5vw,34px);line-height:1.02;margin:3px 0 10px;animation:slideIn .5s .08s both}

  .verdict .burst,.scenecard .burst{position:absolute;inset:0;pointer-events:none}
  .burst i{position:absolute;width:9px;height:9px;border-radius:2px;opacity:0;animation:burst .9s ease-out .12s forwards}
  @keyframes bounceIn{0%{opacity:0;transform:scale(.4)}60%{transform:scale(1.14)}100%{opacity:1;transform:scale(1)}}
  @keyframes stampIn{0%{opacity:0;transform:scale(1.7) rotate(-6deg)}70%{transform:scale(.96)}100%{opacity:1;transform:scale(1) rotate(0)}}
  @keyframes burst{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.3) rotate(120deg)}}
  .vn{min-height:86vh;display:grid;grid-template-columns:360px 1fr;gap:38px;align-items:center}
  .dchar{display:grid;place-items:end center}
  .dname{font-weight:700;letter-spacing:1.5px;font-size:12px;text-transform:uppercase;color:var(--amber2);margin-bottom:12px}
  .dbox{position:relative;background:#FBFAF7;color:var(--ink);border-radius:22px;padding:28px 32px;box-shadow:var(--sh-lg);cursor:pointer;min-height:150px}

  .dbox h1,.dbox h2,.dbox h3{color:var(--ink)}
  .dtext{font-family:var(--sans);font-size:27px;line-height:1.3;font-weight:500;margin:0;min-height:76px}
  .dact{opacity:0;transform:translateY(8px);transition:.45s;margin-top:16px}.dact.show{opacity:1;transform:none}
  .dopts{display:flex;flex-direction:column;gap:9px}
  .dopt{cursor:pointer;text-align:left;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:12px 16px;font-family:var(--sans);font-size:16px;font-weight:600;color:var(--ink);display:flex;align-items:center;gap:12px;transition:.14s}
  .dopt:hover{border-color:var(--amber);transform:translateX(4px);background:#FFFDF8}
  .dopt b{width:26px;height:26px;border-radius:50%;background:var(--amber);color:#fff;display:grid;place-items:center;font-size:13px;flex:none}
  @media(max-width:900px){.vn{grid-template-columns:1fr;min-height:auto}.dchar{max-width:200px;margin:0 auto}.dtext{font-size:24px}}
  textarea,input[type=text]{width:100%;font-family:var(--sans);font-size:14px;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff}
  input:focus{outline:none;border-color:var(--amber)}
  .steps{display:flex;gap:7px}.steps i{width:26px;height:5px;border-radius:999px;background:rgba(255,255,255,.2)}.steps i.on{background:var(--amber2)}
  .readcard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);border-radius:22px;padding:26px 30px}
  .rr{display:grid;grid-template-columns:112px 1fr 52px;gap:14px;align-items:center;margin:12px 0}
  .rr .lab{font-size:11.5px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#AEB6C9}
  .rr .meter{background:rgba(255,255,255,.12)}
  .rr .rn{font-weight:800;color:#fff;font-variant-numeric:tabular-nums;opacity:0;transition:.5s .6s}
  .rr .rn.show{opacity:1}
  .ph2{opacity:0;transform:translateY(16px);transition:.6s cubic-bezier(.2,.7,.2,1)}.ph2.show{opacity:1;transform:none}
  .tabs{display:flex;gap:9px;flex-wrap:wrap;margin:8px 0 20px}
  .tab{cursor:pointer;border:1.5px solid var(--line);background:#fff;border-radius:999px;padding:9px 18px;font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;transition:.15s}.tab svg{width:16px;height:16px;opacity:.8}.tab:hover{border-color:var(--amber);transform:translateY(-2px)}.tab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .chip{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:14px;font-weight:600;margin:5px 6px 0 0;animation:pop .4s both}
  .chip b{width:7px;height:7px;border-radius:50%;background:var(--amber2)}
  .trail{display:flex;gap:7px;align-items:center}
  .trail b{width:25px;height:25px;border-radius:50%;display:grid;place-items:center;font-size:12px;font-weight:800;color:#fff;animation:pop .35s both}
  .trail b.good{background:#3F9E6A}.trail b.miss{background:#B2483A}
  .trail i.cur{width:11px;height:11px;border-radius:50%;background:var(--amber2);animation:glow 1.6s infinite}
  .trail i.fut{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.22)}
  .rrow{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1px solid var(--line);border-radius:12px;margin:7px 0;background:#fff;animation:fadeUp .45s both}

  .draw .dl{stroke-dasharray:1;stroke-dashoffset:1;animation:drawin .9s cubic-bezier(.3,.7,.3,1) forwards}
  .lbl{animation:fadeUp .5s .55s both}

  .stattile .n{font-family:var(--serif);font-size:40px;font-weight:600;color:var(--gold);line-height:1;font-variant-numeric:tabular-nums}

  @media(max-width:900px){.stgrid{grid-template-columns:1fr}}
  /* ---- verdict cinematics ---- */

const AC={ctx:null,ensure(){if(!S.audio)return null;try{if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume()}catch(e){return null}return this.ctx},

let skyOn=false,stars=[],met=null,lastMet=0;
function sizeSky(){if(!sctx)return;const d=Math.min(window.devicePixelRatio||1,2);sky.width=innerWidth*d;sky.height=innerHeight*d;sctx.setTransform(d,0,0,d,0,0);stars=[];const n=Math.min(150,Math.floor(innerWidth*innerHeight/13000));for(let i=0;i<n;i++)stars.push({x:Math.random()*innerWidth,y:Math.random()*innerHeight,r:.4+Math.random()*1.3,ph:Math.random()*6.28,sp:.4+Math.random()*1.2,c:Math.random()<.16?'#CBBC9E':'#C9D3EA'});if(RM&&document.body.classList.contains('night'))drawSky(0,true)}
function drawSky(t,still){if(!sctx)return;sctx.clearRect(0,0,innerWidth,innerHeight);

    if(clipsOn()){setTimeout(()=>playClip(S.persona,idx,ci),160)}
    else setTimeout(()=>{flashFx(g);g?snd.good():snd.bad();if(!g){const sc=el('scene');sc&&sc.classList.add('shake')}},40)}}
function pickChoice(i){const key=S.persona+':'+S.nodeIdx;if(S.choices[key]&&S.choices[key].i===i)return;S.choices[key]={i};S._fx=PERSONAS[S.persona].nodes[S.nodeIdx].choices[i].rec?'good':'bad';save();render()}
function nextNode(){if(!S.choices[S.persona+':'+S.nodeIdx])return;S.nodeIdx++;snd.tick();save();render();window.scrollTo({top:0,behavior:'smooth'})}
function prevNode(){if(S.nodeIdx>0)S.nodeIdx--;save();render();window.scrollTo({top:0,behavior:'smooth'})}

/* ---------------- ACT IV · THREE FORCES ---------------- */
function rFoundations(app){const tabs=FOUNDATIONS.map(f=>`<div class="tab ${S.foundTab===f.key?'on':''}" data-tab="${f.key}">${IC[f.key]} ${f.label}</div>`).join('');
  const f=FOUNDATIONS.find(x=>x.key===S.foundTab);
  const firstF=window._ft!==f.key;window._ft=f.key;
  app.innerHTML=`<div class="wrap"><div class="kick">Three Forces</div><h1 class="bigline" style="font-size:clamp(30px,6vw,44px)">The forces behind every story</h1>
    <div class="tabs" style="margin-top:18px">${tabs}</div>
    <div class="scenecard" style="min-height:280px;color:#fff"><div style="flex:1"><div style="color:var(--amber2);font-weight:700;letter-spacing:1px;font-size:12px;text-transform:uppercase">${f.label}</div>
      <h2 style="color:#fff;font-size:clamp(26px,5.5vw,34px);margin:6px 0 12px">${f.head}</h2><p class="bigline" style="color:#e7ebf3;font-size:clamp(24px,5vw,32px);max-width:520px">${firstF?wordsUp(f.line):esc(f.line)}</p>
      <div style="margin-top:16px">${f.chips.map((c,i)=>`<span class="chip" style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);color:#e7ebf3;animation-delay:${(0.3+i*0.14).toFixed(2)}s"><b></b>${esc(c)}</span>`).join('')}</div></div>
      <div style="width:280px">${artPillar(f.key)}</div></div>
    <p class="reflect">Worth sitting with: ${esc(f.discuss)}</p>
    <div style="margin-top:22px"><button class="btn" onclick="go('roadmap')">The road ahead →</button></div></div>`;}

/* ---------------- CLOSING · THE ROAD AHEAD ---------------- */
function rRoadmap(app){let w=null,lo=99;PILLARS.forEach(p=>{const v=avg(S.votes[p.key]);if(S.votes[p.key].length&&v<lo){lo=v;w=p}});
  const per=S.persona?PERSONAS[S.persona]:null;const m=S.persona?momentum(S.persona):null;
  const story=per?`<div class="flex" style="margin:14px 0 4px"><span class="chip"><b></b>You walked ${per.name}’s road${m&&m.done?` · ${m.recs} of ${m.done} best calls`:''}</span>${w?`<span class="chip"><b></b>Your reading points to ${w.label} first</span>`:''}</div>`:'';
  const steps=[
   ['See clearly before you spend','Score yourselves honestly across the three foundations — before anyone commits a dollar to building.'],
   ['Put AI in your leaders’ hands','An hour of real use changes the conversation more than a quarter of slideware.'],
   ['Prove it small','One workflow, one owner, one number you already track. Belief follows evidence.']];
  app.innerHTML=`<div class="wrap"><div class="kick">The Road Ahead</div><h1 class="bigline" style="font-size:clamp(30px,7vw,48px)">How your story continues.</h1>
    ${story}
    <div style="margin:16px 0">${artRoad()}</div>
    <div class="grid g3">
      ${FOUNDATIONS.map((f,i)=>`<div class="card" style="animation:fadeUp .5s ${(0.1+i*0.15).toFixed(2)}s both"><div class="flex" style="gap:10px;margin-bottom:6px"><div class="icircle">${IC[f.key]}</div><strong style="font-family:var(--serif);font-size:17px">${f.label}</strong></div><p style="margin:4px 0 0;font-size:15px;color:var(--slate)">${esc(f.head)} ${esc(f.line)}</p></div>`).join('')}</div>
    <div class="kick" style="margin:26px 0 4px">Where to go from here</div>
    ${steps.map((st,i)=>`<div class="rrow" style="animation-delay:${(0.3+i*0.15).toFixed(2)}s"><b style="flex:none;width:26px;height:26px;border-radius:50%;border:1.5px solid var(--amber);color:var(--amber);display:grid;place-items:center;font-size:12px;font-weight:800">${i+1}</b><div><strong>${st[0]}.</strong> <span class="muted" style="font-size:14.5px">${st[1]}</span></div></div>`).join('')}
    <div class="scenecard" style="margin-top:20px"><div class="ring soft" style="width:200px;height:200px;top:-70px;right:-60px"></div>
      <div style="flex:1"><div style="color:var(--amber2);font-weight:700;letter-spacing:1px;font-size:12px;text-transform:uppercase">A parting word</div>
        <h2 style="color:#fff;font-size:clamp(25px,5.5vw,32px);margin:8px 0 8px">Before you transform anything, see clearly.</h2>
        <p style="font-family:var(--serif);font-size:20px;color:#e7ebf3;max-width:520px">The leaders who crossed the divide didn’t start by building. They started by seeing. When you want a guide for that first step, we’re easy to find.</p>
        <div class="wordmark" style="margin-top:12px">SOCRATIX AI · <span style="font-family:var(--serif);letter-spacing:0;font-style:italic;text-transform:none">Human Wisdom. AI Illumination.</span> · <span style="letter-spacing:.5px;text-transform:none">socratixai.com</span></div></div>
      <div class="charwrap">${CHAR('guide','calm',220)}</div></div>
    <div class="flex noprint" style="margin-top:22px"><button class="btn ghost" onclick="resetJourney()">Start over</button></div></div>`;}

/* ---------------- EVENTS ---------------- */
const appEl=el('app');
appEl.addEventListener('click',e=>{const t=e.target.closest('[data-persona],[data-choice],[data-tab],[data-dlg],[data-ans]');if(!t)return;
  if(t.dataset.dlg){S.dlg=(S.dlg||0)+1;snd.tick();save();render();return}
  if(t.dataset.ans){const[k,n]=t.dataset.ans.split(':');S.votes[k]=[+n];S.dlg=(S.dlg||0)+1;snd.tick();save();render();return}
  if(t.dataset.persona){S.persona=t.dataset.persona;S.nodeIdx=0;snd.tick();save();go('journey')}
  else if(t.dataset.choice!=null){pickChoice(+t.dataset.choice)}
  else if(t.dataset.tab){S.foundTab=t.dataset.tab;snd.tick();save();render()}});
/* 3D tilt on pointer (desktop only) */
if(!(window.matchMedia&&matchMedia('(pointer:coarse)').matches)&&!RM){
 document.addEventListener('mousemove',e=>{const c=e.target.closest?e.target.closest('.tilt'):null;
  if(window._tl&&window._tl!==c){window._tl.style.transform='';window._tl=null}
  if(!c)return;window._tl=c;const r=c.getBoundingClientRect(),x=(e.clientX-r.left)/r.width-.5,y=(e.clientY-r.top)/r.height-.5;
  c.style.transform=`perspective(700px) rotateY(${(x*7).toFixed(2)}deg) rotateX(${(-y*7).toFixed(2)}deg) translateY(-4px)`});}
/* keyboard: F controls · Esc closes · ←/→ + clicker keys navigate */
document.addEventListener('keydown',e=>{
  if(/input|textarea|select/i.test(document.activeElement.tagName))return;
  if(e.key==='Escape'){closeClip();if(el('act').classList.contains('show'))hideAct();return}
  const fwd=['ArrowRight','PageDown'].includes(e.key),back=['ArrowLeft','PageUp'].includes(e.key);
  if(!fwd&&!back)return;
  if(el('clip').classList.contains('show')){closeClip();return}
  if(el('act').classList.contains('show')){hideAct();return}
  if(S.stage==='baseline'){const b=DLG[Math.min(S.dlg||0,DLG.length-1)];
    if(fwd&&!b.ask&&!b.reveal){S.dlg=(S.dlg||0)+1;save();render()}else if(back&&(S.dlg||0)>0){S.dlg--;save();render()}return}
  if(S.stage==='journey'){fwd?nextNode():prevNode()}});
el('act').addEventListener('click',hideAct);
el('clip').addEventListener('click',closeClip);
sizeSky();
render();
</script>
</body>
</html>
