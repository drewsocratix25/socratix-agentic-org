<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>

<title>The Agentic Org — A Socratix Journey</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--navy:#254E64;--ink:#2E3338;--amber:#254E64;--amber2:#CBBC9E;--amber-soft:#E8EEF1;--cream:#EFF3F4;--paper:#FFFFFF;--slate:#556270;--line:#DCE3E6;--tint:#E9EFF1;
    --serif:'Cinzel',Georgia,serif;--sans:'Raleway','Segoe UI',system-ui,sans-serif;--sh:0 14px 40px -18px rgba(20,27,46,.28);--sh-lg:0 30px 70px -30px rgba(20,27,46,.45);--r:24px}

  h1,h2,h3{font-family:var(--serif);font-weight:600;letter-spacing:-.5px;margin:0}

  .bigline{font-family:var(--sans);font-weight:700;letter-spacing:-.3px;line-height:1.1;font-size:46px}
  .btn{cursor:pointer;border:none;border-radius:999px;font-family:var(--sans);font-weight:700;font-size:16px;padding:14px 28px;color:#fff;background:linear-gradient(180deg,#2E5E77,#254E64);box-shadow:0 12px 26px -12px rgba(37,78,100,.7);transition:.18s}
  .btn:hover{transform:translateY(-2px)}.btn:disabled{opacity:.35;cursor:default;box-shadow:none;transform:none}
  .btn.ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);box-shadow:none}

  .btn.sm{font-size:13px;padding:8px 15px}

  .pill{display:inline-flex;align-items:center;font-size:10.5px;font-weight:700;letter-spacing:.6px;padding:4px 9px;border-radius:999px;margin:4px 5px 0 0;text-transform:uppercase}
  .pill.strategy{background:#E8EFF6;color:#1F4E6B}.pill.people{background:#FBEEDD;color:#8a5a12}.pill.tech{background:#EAE7F3;color:#463c73}
  .pill.buy{background:#E4F1E7;color:#1c6b34}.pill.build{background:#FCE7CF;color:#9a5a12}.pill.ignore{background:#F3E2E2;color:#8a2f2f}
  .pill.econ{background:var(--tint);color:var(--slate);text-transform:none;letter-spacing:0}.pill.ond{background:rgba(255,255,255,.12);color:#dfe4ef}
  .icircle{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;background:var(--amber-soft);color:var(--amber);flex:none}.icircle svg{width:24px;height:24px}
  .ring{position:absolute;border-radius:50%;border:2px solid var(--amber);pointer-events:none}.ring.soft{border-color:rgba(255,255,255,.13)}
  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
  @keyframes slideIn{from{opacity:0;transform:translateX(26px)}to{opacity:1;transform:none}}
  @keyframes pop{0%{opacity:0;transform:scale(.86) translateY(10px)}60%{transform:scale(1.02)}100%{opacity:1;transform:none}}
  @keyframes drift{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-7px) rotate(7deg)}}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  @keyframes blink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(.08)}}
  @keyframes twinkle{0%,100%{opacity:.35;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
  @keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}
  #app>*{animation:fadeUp .5s cubic-bezier(.2,.7,.2,1)}
  .charwrap{animation:pop .55s cubic-bezier(.2,.8,.2,1)}
  .char{transform-box:fill-box;animation:bob 4.6s ease-in-out infinite;overflow:visible}
  .char .eyes{transform-box:fill-box;transform-origin:center;animation:blink 5.2s infinite}
  .char .fl{transform-box:fill-box;animation:drift 6s ease-in-out infinite}
  .char .tw{transform-box:fill-box;transform-origin:center;animation:twinkle 2.4s ease-in-out infinite}
  :focus-visible{outline:3px solid var(--amber);outline-offset:3px}
  @media(prefers-reduced-motion:reduce){*{animation-duration:.001ms!important;transition-duration:.001ms!important}}
  .dark-stage{position:relative;min-height:100%;overflow:hidden;color:var(--cream);background:radial-gradient(900px 520px at 82% -6%,#263255 0%,transparent 55%),linear-gradient(160deg,#161D31,#0F1424 90%)}

  .choice{position:relative;display:flex;align-items:center;gap:14px;width:100%;text-align:left;cursor:pointer;background:var(--paper);border:1.5px solid var(--line);border-radius:14px;padding:14px 18px;margin:9px 0;font-size:18px;font-weight:500;color:var(--ink);transition:.15s;font-family:var(--sans);animation:fadeUp .45s both}
  .choice:nth-of-type(1){animation-delay:.05s}.choice:nth-of-type(2){animation-delay:.12s}.choice:nth-of-type(3){animation-delay:.19s}

  .choice.on .num{background:var(--amber);border-color:var(--amber);color:#20160a}
  .choice .rec-tag{position:absolute;top:-8px;right:14px;background:var(--amber);color:#fff;font-size:9.5px;font-weight:800;letter-spacing:1px;padding:2px 8px;border-radius:999px}

  .verdict.good{background:linear-gradient(180deg,#EAF6ED,#DBEEE1)}
  .verdict.bad{background:linear-gradient(180deg,#FBECE8,#F5E0D9)}
  .verdict .vface{flex:none;animation:bounceIn .6s cubic-bezier(.2,1.5,.4,1) both}
  .verdict .vkick{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--slate)}
  .verdict .vline{font-family:var(--serif);font-weight:600;font-size:34px;line-height:1.02;margin:3px 0 10px;animation:slideIn .5s .08s both}
  .verdict .vtags .pill{animation:stampIn .45s .22s both}
  .verdict .burst{position:absolute;inset:0;pointer-events:none}
  .verdict .burst i{position:absolute;width:9px;height:9px;border-radius:2px;opacity:0}
  .verdict.good .burst i{animation:burst .9s ease-out .12s forwards}
  @keyframes bounceIn{0%{opacity:0;transform:scale(.4)}60%{transform:scale(1.14)}100%{opacity:1;transform:scale(1)}}
  @keyframes stampIn{0%{opacity:0;transform:scale(1.7) rotate(-6deg)}70%{transform:scale(.96)}100%{opacity:1;transform:scale(1) rotate(0)}}
  @keyframes burst{0%{opacity:1;transform:translate(0,0) scale(1) rotate(0)}100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.3) rotate(120deg)}}
  .vn{min-height:86vh;display:grid;grid-template-columns:360px 1fr;gap:38px;align-items:center}

  .dname{font-weight:700;letter-spacing:1.5px;font-size:12px;text-transform:uppercase;color:var(--amber2);margin-bottom:12px}

  .dtext{font-family:var(--sans);font-size:27px;line-height:1.3;font-weight:500;margin:0;min-height:76px}

  .dopt:hover{border-color:var(--amber);transform:translateX(3px)}
  .dopt b{width:26px;height:26px;border-radius:50%;background:var(--amber);color:#fff;display:grid;place-items:center;font-size:13px;flex:none}
  @media(max-width:900px){.vn{grid-template-columns:1fr;min-height:auto}.dchar{max-width:200px;margin:0 auto}.dtext{font-size:24px}}
  textarea,input[type=text]{width:100%;font-family:var(--sans);font-size:14px;border:1.5px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff}
  input:focus{outline:none;border-color:var(--amber)}
  .steps{display:flex;gap:7px}.steps i{width:26px;height:5px;border-radius:999px;background:rgba(255,255,255,.2)}.steps i.on{background:var(--amber)}
  .demoposter{position:relative;border-radius:14px;min-height:210px;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--cream);overflow:hidden;background:radial-gradient(600px 300px at 30% 0%,#2b3760,transparent 60%),linear-gradient(150deg,#1b2338,#0f1424)}
  .playbtn{width:64px;height:64px;border-radius:50%;background:rgba(224,147,42,.16);border:2px solid var(--amber);display:grid;place-items:center;color:var(--amber);animation:glow 2.4s infinite}.playbtn svg{width:24px;height:24px;margin-left:4px}
  .tabs{display:flex;gap:9px;flex-wrap:wrap;margin:8px 0 20px}

  .chip{display:inline-flex;align-items:center;gap:7px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:14px;font-weight:600;margin:5px 6px 0 0}
  .chip b{width:7px;height:7px;border-radius:50%;background:var(--amber)}
  .brow{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:11px 15px;margin:8px 0;background:var(--paper)}
  .bchip{cursor:pointer;border:1.5px solid var(--line);background:#fff;border-radius:9px;padding:7px 12px;font-weight:700;font-size:12px;margin-left:6px}
  .bchip.on.buy{background:#E4F1E7;border-color:#1c6b34;color:#1c6b34}.bchip.on.build{background:#FCE7CF;border-color:#9a5a12;color:#9a5a12}.bchip.on.ignore{background:#F3E2E2;border-color:#8a2f2f;color:#8a2f2f}
  .meter{height:9px;border-radius:999px;background:var(--tint);overflow:hidden}.meter>i{display:block;height:100%;background:linear-gradient(90deg,var(--amber2),var(--amber));transition:width .5s}
  .scoreseg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .scoreseg button{width:48px;height:44px;border:none;background:#fff;font-weight:700;font-size:16px;color:var(--slate);cursor:pointer;border-right:1px solid var(--line)}.scoreseg button:last-child{border-right:none}.scoreseg button.on{background:linear-gradient(180deg,var(--amber2),var(--amber));color:#20160a}
  #prog{position:fixed;top:0;left:0;right:0;height:3px;z-index:60}#prog>i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--amber2),var(--amber));transition:width .5s;box-shadow:0 0 12px rgba(224,147,42,.6)}
  #chapters{position:fixed;top:12px;left:0;right:0;display:flex;justify-content:center;gap:2px;z-index:55;pointer-events:none;flex-wrap:wrap;padding:0 12px}
  #chapters .ch{display:flex;align-items:center;gap:7px;font-size:10px;font-weight:700;letter-spacing:.6px;color:var(--slate);opacity:.4;text-transform:uppercase;transition:.35s;padding:3px 9px}
  #chapters .ch i{width:7px;height:7px;border-radius:50%;background:var(--line);transition:.35s}
  #chapters .ch.on{opacity:1;color:var(--amber)}#chapters .ch.on i{background:var(--amber);box-shadow:0 0 0 4px rgba(224,147,42,.16)}
  #chapters .ch.done{opacity:.8}#chapters .ch.done i{background:var(--amber)}
  #chapters.ond .ch{color:#9aa3b8}#chapters.ond .ch.on{color:var(--amber2)}#chapters.ond .ch i{background:rgba(255,255,255,.22)}#chapters.ond .ch.on i,#chapters.ond .ch.done i{background:var(--amber2)}
  @media(max-width:900px){#chapters .ch span{display:none}}
  #fbar{position:fixed;left:16px;right:16px;bottom:16px;background:rgba(18,24,40,.92);backdrop-filter:blur(10px);color:var(--cream);display:flex;align-items:center;gap:11px;padding:10px 15px;border-radius:15px;z-index:50;flex-wrap:wrap;box-shadow:var(--sh-lg);font-size:12.5px}
  #fbar.hidden{display:none}
  #fbar select,#fbar .fbtn{background:rgba(255,255,255,.08);color:var(--cream);border:1px solid rgba(255,255,255,.12);border-radius:9px;padding:7px 11px;font-size:12.5px;cursor:pointer;font-family:var(--sans)}
  #fbar .fbtn:hover{background:rgba(224,147,42,.22)}#fbar .timer{font-weight:700;color:var(--amber2);font-variant-numeric:tabular-nums}#fbar .spacer{flex:1}#fbar .lbl{color:#9aa3b8}
  .fscript{background:#0d1220;color:#c9d3e2;border-radius:12px;padding:14px 16px;margin:12px 0;font-size:13.5px;line-height:1.5;display:none}.fscript.show{display:block}.fscript b{color:var(--amber2)}
  #disc{position:fixed;inset:0;z-index:80;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;background:radial-gradient(700px 400px at 50% 30%,#263255,transparent 60%),rgba(11,15,26,.96);color:var(--cream)}
  #disc.show{display:flex}#disc .count{font-family:var(--serif);font-size:150px;font-weight:600;line-height:1;color:#fff}
  svg.art{width:100%;height:auto;display:block}
  @media print{#fbar,#prog,#chapters,.noprint{display:none!important}}
  @media(max-width:900px){.g3{grid-template-columns:1fr}.wrap{padding:60px 20px 130px}.bigline{font-size:34px}.scenecard{flex-direction:column;text-align:center}}
</style>
</head>
<body>
<div id="prog"><i></i></div>
<div id="chapters"></div>
<div id="app"></div>
<div id="disc"><div class="kick l" style="justify-content:center">Discuss</div><div id="discPrompt" style="font-family:var(--serif);font-size:32px;max-width:860px;margin:8px 0 22px;line-height:1.2"></div><div id="discCount" class="count">90</div><div style="margin-top:26px"><button class="btn" onclick="stopDisc()">Done</button></div></div>

</div>
<script>

 const M={open:`<ellipse cx="100" cy="127" rx="5" ry="6" fill="#C56B63"/>`,

    app.innerHTML=`<div class="dark-stage"><div class="wrap vn">
      <div class="dchar"><div class="charwrap">${CHAR(d.id,per.mood,300)}</div></div>
      <div><div class="dname">Socrates reads the room…</div>
        <div class="dbox"><div class="vkick" style="color:var(--amber)">You might relate to…</div><h2 style="font-size:38px;margin:2px 0 8px">${per.name}, ${per.role}</h2>
          <p style="font-size:19px;margin:0 0 8px;font-family:var(--serif)">${d.read}</p><p class="muted" style="font-size:13px">The room reads ${d.tot.toFixed(1)} of 15.</p>
          <div class="dact show" style="margin-top:16px"><button class="btn" onclick="go('choose')">Meet the leaders →</button></div></div></div>
    </div></div>`;return;}
  const gm=beat.mood||'calm';
  const actions=beat.ask?`<div class="dopts">${beat.labels.map((l,k)=>`<button class="dopt" data-ans="${beat.ask}:${k+1}"><b>${k+1}</b>${l?`<span>${esc(l)}</span>`:''}</button>`).join('')}</div>`:`<button class="btn" data-dlg="1">Continue ▸</button>`;
  app.innerHTML=`<div class="dark-stage"><div class="wrap vn">
    <div class="dchar"><div class="charwrap">${CHAR('guide',gm,300)}</div></div>
    <div><div class="dname">Socrates · your AI guide</div>
      <div class="dbox" onclick="skipType()"><p id="dtext" class="dtext"></p><div class="dact" id="dact">${actions}</div></div>
      <div class="steps" style="margin-top:18px">${DLG.filter(b=>!b.reveal).map((b,k)=>`<i class="${k<=i?'on':''}"></i>`).join('')}</div></div>
  </div></div>`;
  const text=beat.ask?beat.q:beat.say;setTimeout(()=>{const n=el('dtext');if(n)typeInto(n,text,()=>{const a=el('dact');if(a)a.classList.add('show')})},50);}

function rChoose(app){const cards=Object.entries(PERSONAS).map(([id,p])=>`<div class="card tap" data-persona="${id}" style="background:rgba(255,255,255,.04);border-color:${S.suggest===id?'var(--amber)':'rgba(255,255,255,.1)'};color:#fff;text-align:center;position:relative">${S.suggest===id?`<div style="position:absolute;top:10px;right:10px;background:var(--amber);color:#fff;font-size:9px;font-weight:800;letter-spacing:1px;padding:3px 8px;border-radius:999px">YOU MIGHT RELATE</div>`:''}
  <div style="height:200px;display:grid;place-items:end center"><div class="charwrap">${CHAR(id,p.mood,190)}</div></div>
  <strong style="font-size:23px;font-family:var(--serif)">${p.name}</strong>
  <div style="color:var(--amber2);font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;margin:4px 0 8px">${p.role}</div>
  <p style="font-size:16px;color:#dfe4ef;font-style:italic;font-family:var(--serif)">“${p.quote}”</p></div>`).join('');
  app.innerHTML=`<div class="dark-stage"><div class="wrap"><div class="kick l">Choose a Story</div><h1 class="bigline">Whose shoes?</h1>
    <p class="muted" style="font-size:19px;margin-top:12px">Three leaders. The same three foundations.</p>
    <div class="grid g3" style="margin-top:26px">${cards}</div></div></div>`;}

function rJourney(app){const p=PERSONAS[S.persona];if(!p){go('choose');return}const idx=S.nodeIdx;
  if(idx>=p.nodes.length){app.innerHTML=`<div class="wrap"><div class="kick">${p.name} · The end</div>
    <div class="scenecard"><div class="ring soft" style="width:200px;height:200px;top:-70px;right:-60px"></div>
      <div style="flex:1"><div style="color:var(--amber2);font-weight:700;letter-spacing:1px;font-size:12px;text-transform:uppercase">${p.role}</div><p class="bigline" style="color:#fff;margin-top:10px;font-size:40px">${esc(p.outcome)}</p></div>
      <div class="charwrap">${CHAR(S.persona,'proud',260)}</div></div>
    <div class="flex" style="margin-top:22px"><button class="btn" onclick="go('foundations')">The three forces →</button><button class="btn ghost" onclick="go('choose')">Another story</button></div></div>`;return;}
  const node=p.nodes[idx],picked=S.choices[S.persona+':'+idx];window._dp=node.discuss;
  const mood=picked?(node.choices[picked.i].rec?'happy':'worried'):node.mood;
  const choices=node.choices.map((c,i)=>{const on=picked&&picked.i===i;return `<button class="choice ${on?'on':''}" data-choice="${i}">${(S.reveal&&c.rec)?'<span class="rec-tag">Best</span>':''}<span class="num">${String.fromCharCode(65+i)}</span><span>${esc(c.t)}</span></button>`}).join('');
  let below='';
  if(picked){const c=node.choices[picked.i];
    below=`<div class="verdict ${c.rec?'good':'bad'}">${c.rec?burst():''}<div class="vface">${REACT(!!c.rec,74)}</div>
      <div style="flex:1;position:relative"><div class="vkick">You chose · ${esc(c.t)}</div><div class="vline">${esc(c.c)}</div><div class="vtags">${c.tags.map(t=>tagPill(t)).join('')}</div></div></div>
      <div class="flex noprint" style="margin-top:8px"><span class="muted" style="font-size:14px">${esc(node.discuss)}</span><button class="btn ghost sm" onclick="startDisc(90)">90s</button><input type="text" id="noteIn" placeholder="Room’s answer…" style="max-width:260px"/><button class="btn ghost sm" onclick="addNote()">Save</button></div>`;}
  const demo=node.demo&&picked?demoCard(node.demo):'';
  app.innerHTML=`<div class="wrap"><div class="kick">${p.name} · Scene ${idx+1}/${p.nodes.length}</div>
    ${idx===0?`<p style="font-family:var(--serif);font-size:20px;color:var(--slate);margin:0 0 16px">${esc(p.opening)}</p>`:''}
    <div class="scenecard"><div class="ring soft" style="width:220px;height:220px;top:-80px;right:-70px"></div>
      <div style="flex:1"><div class="flex" style="gap:10px;margin-bottom:14px">${tagPill(node.pillar,true)}<div class="steps">${p.nodes.map((n,i)=>`<i class="${i<=idx?'on':''}"></i>`).join('')}</div></div>
        <p class="bigline" style="color:#fff;font-size:44px;max-width:560px">${esc(node.line)}</p></div>
      <div class="charwrap" id="charSlot">${CHAR(S.persona,mood,270)}</div></div>
    <div style="margin-top:18px">${choices}</div>${below}${demo}
    <div class="flex" style="margin-top:18px">${idx>0?`<button class="btn ghost" onclick="prevNode()">← Back</button>`:''}<button class="btn" onclick="nextNode()" ${picked?'':'disabled'}>${idx===p.nodes.length-1?'The end':'Next'} →</button></div></div>`;}
function demoCard(kind){const d=DEMOS[kind];return `<div class="card noprint" style="margin-top:14px"><div class="flex" style="gap:12px;margin-bottom:10px"><div class="icircle">${IC.play}</div><strong>${d.title}</strong></div><div id="demoBox">${demoPoster(kind)}</div>${fscript(d.script)}</div>`}
function demoPoster(kind){return `<div class="demoposter"><div class="playbtn">${IC.play}</div><div style="font-size:13px;color:#AEB6C9;margin-top:12px">Paste a video URL, or play your clip</div><div class="flex noprint" style="margin-top:12px"><input type="text" id="vidUrl" placeholder="https://…" style="max-width:320px"/><button class="btn sm" onclick="embedVid()">Embed</button></div></div>`}
function embedVid(){const u=el('vidUrl')&&el('vidUrl').value.trim();if(!u)return;let src=u;const yt=u.match(/(?:youtu\.be\/|v=)([\w-]{6,})/);if(yt)src='https://www.youtube.com/embed/'+yt[1];el('demoBox').innerHTML=`<div style="position:relative;padding-top:56%;border-radius:14px;overflow:hidden"><iframe src="${src}" style="position:absolute;inset:0;width:100%;height:100%;border:0" allowfullscreen></iframe></div>`}
function pickChoice(i){S.choices[S.persona+':'+S.nodeIdx]={i};save();render()}
function nextNode(){if(!S.choices[S.persona+':'+S.nodeIdx])return;S.nodeIdx++;save();render();window.scrollTo({top:0,behavior:'smooth'})}
function prevNode(){if(S.nodeIdx>0)S.nodeIdx--;save();render();window.scrollTo({top:0,behavior:'smooth'})}
function addNote(){const inp=el('noteIn');const v=inp&&inp.value.trim();if(!v)return;S.notes.push({prompt:PERSONAS[S.persona].nodes[S.nodeIdx].discuss,text:v});save();render()}

function rFoundations(app){const tabs=FOUNDATIONS.map(f=>`<div class="tab ${S.foundTab===f.key?'on':''}" data-tab="${f.key}">${IC[f.key]} ${f.label}</div>`).join('');
  const f=FOUNDATIONS.find(x=>x.key===S.foundTab);window._dp=f.discuss;const demo=f.demo?demoCard(f.demo):'';
  app.innerHTML=`<div class="wrap"><div class="kick">Three Forces</div><h1 class="bigline" style="font-size:44px">The forces behind every story</h1>
    <div class="tabs" style="margin-top:18px">${tabs}</div>
    <div class="scenecard" style="min-height:280px;color:#fff"><div style="flex:1"><div style="color:var(--amber2);font-weight:700;letter-spacing:1px;font-size:12px;text-transform:uppercase">${f.label}</div>
      <h2 style="color:#fff;font-size:34px;margin:6px 0 12px">${f.head}</h2><p class="bigline" style="color:#e7ebf3;font-size:32px;max-width:520px">${esc(f.line)}</p>
      <div style="margin-top:16px">${f.chips.map(c=>`<span class="chip" style="background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.14);color:#e7ebf3"><b></b>${esc(c)}</span>`).join('')}</div></div>
      <div style="width:280px">${artPillar(f.key)}</div></div>
    <div class="flex noprint" style="margin-top:14px"><span class="muted" style="font-size:15px">${esc(f.discuss)}</span><button class="btn ghost sm" onclick="startDisc(90)">90s</button></div>${demo}
    <div style="margin-top:22px"><button class="btn" onclick="go('sandbox')">The table →</button></div></div>`;}

function rSandbox(app){const rows=S.sandbox.map((u,i)=>`<div class="brow"><div style="font-size:16px">${esc(u.t)} ${u.e?`<span class="pill econ">${u.e==='save'?'saves':'creates'}</span>`:''}</div><div><button class="bchip buy ${u.v==='buy'?'on buy':''}" data-b="${i}:buy">Buy</button><button class="bchip build ${u.v==='build'?'on build':''}" data-b="${i}:build">Build</button><button class="bchip ignore ${u.v==='ignore'?'on ignore':''}" data-b="${i}:ignore">Ignore</button></div></div>`).join('');
  app.innerHTML=`<div class="wrap"><div class="kick">The Table</div><h1 class="bigline" style="font-size:44px">Now, your own hand.</h1>
    <p class="muted" style="font-size:17px;margin-top:10px">Sort each. Most Buy. A few Build. Some Ignore.</p>
    <div style="margin-top:16px">${rows}</div>
    <div class="flex noprint" style="margin-top:12px"><input type="text" id="newUse" placeholder="Add one from the room…" style="max-width:340px"/><button class="btn ghost sm" onclick="addUse()">Add</button></div>
    <div style="margin-top:22px"><button class="btn" onclick="go('roadmap')">The road ahead →</button></div></div>`;}
function addUse(){const inp=el('newUse');const v=inp&&inp.value.trim();if(!v)return;S.sandbox.push({t:v,v:'',e:''});save();render()}

function rRoadmap(app){let w=null,lo=99;PILLARS.forEach(p=>{const v=avg(S.votes[p.key]);if(S.votes[p.key].length&&v<lo){lo=v;w=p}});
  const B=k=>S.sandbox.filter(u=>u.v===k).map(u=>u.t);const buys=B('buy'),builds=B('build'),ig=B('ignore');
  const paths=[...new Set(Object.keys(S.choices).map(k=>k.split(':')[0]))].map(id=>PERSONAS[id]).filter(Boolean);
  const li=a=>a.length?a.map(b=>`<div style="font-size:15px;padding:3px 0">${esc(b)}</div>`).join(''):'<div class="muted" style="font-size:14px">—</div>';
  app.innerHTML=`<div class="wrap"><div class="kick">The Road Ahead</div><h1 class="bigline" style="font-size:48px">How your story continues.</h1>
    <div style="margin:16px 0">${artRoad()}</div>
    <div class="grid g3">
      <div class="card"><span class="pill buy">Buy · save</span>${li(buys)}</div>
      <div class="card"><span class="pill build">Build · create</span>${li(builds)}</div>
      <div class="card"><span class="pill ignore">Ignore</span>${li(ig)}</div></div>
    ${w?`<p class="bigline" style="font-size:26px;margin-top:20px">Start with <span style="color:var(--amber)">${w.label}</span>.</p>`:''}
    <div class="scenecard" style="margin-top:18px"><div class="ring soft" style="width:200px;height:200px;top:-70px;right:-60px"></div>
      <div style="flex:1"><div style="color:var(--amber2);font-weight:700;letter-spacing:1px;font-size:12px;text-transform:uppercase">Your next step</div>
        <h2 style="color:#fff;font-size:32px;margin:8px 0 8px">The Readiness Sprint</h2>
        <p style="font-family:var(--serif);font-size:20px;color:#e7ebf3;max-width:520px">Two weeks. We score your three foundations, map save-vs-build, hand you a 90-day plan with the first pilot scoped.</p>
        <div class="wordmark" style="margin-top:12px">SOCRATIX AI · <span style="font-family:var(--serif);letter-spacing:0;font-style:italic;text-transform:none">Human Wisdom. AI Illumination.</span></div></div>
      <div class="charwrap">${CHAR('tiger','proud',220)}</div></div>
    <div class="flex noprint" style="margin-top:22px"><button class="btn" onclick="window.print()">Print</button><button class="btn ghost" onclick="go('cover')">Restart</button></div></div>`;}

el('app').addEventListener('click',e=>{const t=e.target.closest('[data-vote],[data-persona],[data-choice],[data-tab],[data-b],[data-dlg],[data-ans]');if(!t)return;
  if(t.dataset.dlg){S.dlg=(S.dlg||0)+1;save();render();return}
  if(t.dataset.ans){const[k,n]=t.dataset.ans.split(':');S.votes[k]=[+n];S.dlg=(S.dlg||0)+1;save();render();return}
  if(t.dataset.vote){const[k,n]=t.dataset.vote.split(':');S.votes[k].push(+n);save();render()}
  else if(t.dataset.persona){S.persona=t.dataset.persona;S.nodeIdx=0;S.stage='journey';save();render();window.scrollTo({top:0,behavior:'smooth'})}
  else if(t.dataset.choice!=null){pickChoice(+t.dataset.choice)}
  else if(t.dataset.tab){S.foundTab=t.dataset.tab;save();render()}
  else if(t.dataset.b){const[i,v]=t.dataset.b.split(':');S.sandbox[+i].v=(S.sandbox[+i].v===v?'':v);save();render()}});
render();
</script>
</body>
</html>
